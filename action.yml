name: Yukh reconciliation
description: Reconcile issues or bootstrap the GitHub Project schema declared by a Yukh policy.
inputs:
  operation:
    description: reconcile-issue or bootstrap-project.
    required: false
    default: reconcile-issue
  issue-number:
    description: Issue number to reconcile. Defaults to the triggering issue. Not required for bootstrap-project.
    required: false
  issue-body:
    description: Optional issue body override. Otherwise the action resolves the issue through GraphQL.
    required: false
  project-number:
    description: GitHub Project v2 number.
    required: true
  policy-path:
    description: Path to the Yukh repository policy.
    required: false
    default: .yukh/project.yaml
  mode:
    description: dry-run or apply. Apply also requires apply-enabled=true and a write-capable token.
    required: false
    default: dry-run
  apply-enabled:
    description: Explicit apply-mode safety gate.
    required: false
    default: "false"
  github-token:
    description: Token used for issue, Project discovery, schema bootstrap, and optional mutations.
    required: false
outputs:
  status:
    description: success when reconciliation completed without diagnostics; error otherwise.
    value: ${{ steps.run.outputs.status }}
  applied:
    description: Number of mutations applied by this invocation.
    value: ${{ steps.run.outputs.applied }}
  remaining:
    description: Number of mutations still required after this invocation.
    value: ${{ steps.run.outputs.remaining }}
runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Install Yukh runtime
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install
    - name: Run Yukh
      id: run
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_OPERATION: ${{ inputs.operation }}
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_ISSUE_BODY: ${{ inputs.issue-body }}
        INPUT_PROJECT_NUMBER: ${{ inputs.project-number }}
        INPUT_POLICY_PATH: ${{ inputs.policy-path }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_APPLY_ENABLED: ${{ inputs.apply-enabled }}
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: npx --prefix "${{ github.action_path }}" tsx "${{ github.action_path }}/src/action-cli.ts"
