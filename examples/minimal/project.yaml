version: 1

project:
  owner: example-owner
  repository: example-repository
  name: Example Project

contract:
  marker: yukh
  schema: 1

bootstrap:
  core:
    enabled: true
  extensions:
    fields:
      area:
        project_field: Area
        required: true
        values:
          product: Product
          platform: Platform

workflow:
  backlog_status: Backlog
  ready_status: Ready
  in_progress_status: In Progress
  review_status: Review
  blocked_status: Blocked
  done_status: Done

defaults:
  execution: hybrid

scheduling:
  automatic_iteration: false

safety:
  overwrite_human_values: false
  fail_on_unknown_values: true
  comment_on_validation_error: true
