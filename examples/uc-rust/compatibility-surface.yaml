schema_version: 1
consumer:
  repository: nomed/uc-rust
  project:
    owner: nomed
    number: 4
mode: shadow
legacy_baseline:
  manifests:
    - governance/github-manifest.json
    - governance/github-structure.json
  scripts:
    - scripts/sync_github_governance.py
    - scripts/sync_project_fields.py
    - scripts/sync_github_structure.py
minimum_projection:
  repository_metadata:
    - labels
    - milestones
  project_items:
    - membership
    - Status
    - Priority
    - Type
    - Area
    - Release
    - Size
  issue_graph:
    - parent_sub_issue
    - dependency
reports:
  - machine_readable_drift
  - human_readable_summary
migration_gate:
  unexplained_drift: 0
  idempotency_required: true
  failure_safety_required: true
  rollback_evidence_required: true
