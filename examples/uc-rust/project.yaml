version: 1

project:
  owner: nomed
  repository: uc-rust
  name: uc-rust

contract:
  marker: yukh
  schema: 1

fields:
  kind:
    project_field: Work Type
    required: true
    values:
      gate: Gate
      epic: Epic
      feature: Feature
      task: Task
  area:
    project_field: Area
    required: true
    values:
      governance: Governance
      runtime: Runtime
      platform: Platform
  priority:
    project_field: Priority
    required: true
    values:
      P0: P0
      P1: P1
      P2: P2
      P3: P3
    accepted_labels:
      - priority:P0
      - priority:P1
      - priority:P2
      - priority:P3
  size:
    project_field: Size
    required: true
    values:
      XS: XS
      S: S
      M: M
      L: L
      XL: XL
  estimate:
    project_field: Estimate
    required: true
    type: number
  iteration:
    project_field: Iteration
  status:
    project_field: Status
    derived: true

relationships:
  parent:
    native: true
  children:
    native: true
  depends_on:
    native: true
  blocks:
    native: true

milestones:
  M0: M0
  M1: M1

defaults:
  execution: hybrid

workflow:
  blocked_status: Blocked
  backlog_status: Backlog
  ready_status: Ready
  in_progress_status: In Progress
  review_status: Review
  done_status: Done

scheduling:
  automatic_iteration: false

safety:
  overwrite_human_values: false
  fail_on_unknown_values: true
  comment_on_validation_error: true
