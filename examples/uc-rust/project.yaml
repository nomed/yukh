version: 1

project:
  owner: nomed
  repository: uc-rust
  name: uc-rust

contract:
  marker: yukh
  schema: 1

bootstrap:
  core:
    enabled: true
  extensions:
    fields:
      area:
        project_field: Area
        required: true
        values:
          governance: Governance
          runtime: Runtime
          platform: Platform

relationships:
  parent:
    native: true
  children:
    native: true
  depends_on:
    native: true
  blocks:
    native: true

milestones:
  M0: M0
  M1: M1

defaults:
  execution: hybrid

workflow:
  blocked_status: Blocked
  backlog_status: Backlog
  ready_status: Ready
  in_progress_status: In Progress
  review_status: Review
  done_status: Done

scheduling:
  automatic_iteration: false

safety:
  overwrite_human_values: false
  fail_on_unknown_values: true
  comment_on_validation_error: true
