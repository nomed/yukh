name: Yukh reusable reconciliation

on:
  workflow_call:
    inputs:
      issue_number:
        type: number
        required: true
      project_number:
        type: number
        required: true
      policy_path:
        type: string
        required: false
        default: .yukh/project.yaml
      mode:
        type: string
        required: false
        default: dry-run
      apply_enabled:
        type: boolean
        required: false
        default: false
    secrets:
      yukh_token:
        description: Optional GitHub App or PAT token with target Project access.
        required: false
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number
        type: number
        required: true
      project_number:
        description: Project v2 number
        type: number
        required: true
      policy_path:
        description: Policy path
        type: string
        required: false
        default: .yukh/project.yaml
      mode:
        description: Reconciliation mode
        type: choice
        options: [dry-run, apply]
        required: false
        default: dry-run
      apply_enabled:
        description: Explicitly allow apply mode
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  issues: read

concurrency:
  group: yukh-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out consumer repository
        uses: actions/checkout@v4
      - name: Check out pinned Yukh action
        uses: actions/checkout@v4
        with:
          repository: nomed/yukh
          ref: v0.2.1
          path: .yukh-action
          persist-credentials: false
      - name: Reconcile issue
        uses: ./.yukh-action
        with:
          issue-number: ${{ inputs.issue_number }}
          project-number: ${{ inputs.project_number }}
          policy-path: ${{ inputs.policy_path }}
          mode: ${{ inputs.mode }}
          apply-enabled: ${{ inputs.apply_enabled }}
          github-token: ${{ secrets.yukh_token || github.token }}
