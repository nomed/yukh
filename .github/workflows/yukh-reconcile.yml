name: Yukh reconciliation

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
      - closed
      - reopened
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reconcile
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue number
        id: issue
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Reconcile project state
        uses: ./
        with:
          config: .yukh/project.yaml
          issue-number: ${{ steps.issue.outputs.number }}
          github-token: ${{ secrets.YUKH_PROJECT_TOKEN }}
