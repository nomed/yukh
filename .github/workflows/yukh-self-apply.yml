name: Yukh self apply

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reconcile
        type: number
        required: true
      project_number:
        description: "GitHub Project number (overrides the YUKH_PROJECT_NUMBER repository variable)"
        type: number
        required: false
      confirm_apply:
        description: Confirm Project mutations
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  issues: read

concurrency:
  group: yukh-self-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: ${{ inputs.confirm_apply }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nomed/yukh@v0.2.0 # x-release-please-version
        with:
          issue-number: ${{ inputs.issue_number }}
          project-number: ${{ inputs.project_number || vars.YUKH_PROJECT_NUMBER }}
          policy-path: .yukh/project.yaml
          mode: apply
          apply-enabled: true
          github-token: ${{ secrets.YUKH_PROJECT_TOKEN }}
