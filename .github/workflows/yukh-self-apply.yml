name: Yukh self apply

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reconcile
        type: number
        required: true
      confirm_apply:
        description: Confirm Project mutations
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  issues: read

concurrency:
  group: yukh-self-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: ${{ inputs.confirm_apply }}
    uses: nomed/yukh/.github/workflows/yukh-reconcile.yml@v0.1.0
    with:
      issue_number: ${{ inputs.issue_number }}
      project_number: ${{ fromJSON(vars.YUKH_PROJECT_NUMBER) }}
      policy_path: .yukh/project.yaml
      mode: apply
      apply_enabled: true
    secrets:
      yukh_token: ${{ secrets.YUKH_PROJECT_TOKEN }}
