name: Yukh self dry-run

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: read

concurrency:
  group: yukh-self-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nomed/yukh@e862f109bb038f8ec0699e42ac2da11c9ef42549 # v0.7.0
        with:
          issue-number: ${{ github.event.issue.number }}
          project-number: ${{ vars.YUKH_PROJECT_NUMBER }}
          policy-path: .yukh/project.yaml
          mode: dry-run
