name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npx vitest run tests/contract.test.ts
      - run: npx vitest run tests/policy.test.ts
      - run: npx vitest run tests/project.test.ts
      - run: npx vitest run tests/reconcile.test.ts
      - run: npx vitest run tests/report.test.ts
      - run: npx vitest run tests/runtime.test.ts
      - run: npx vitest run tests/mutation.test.ts
      - run: npx vitest run tests/relationships.test.ts
      - run: npx vitest run tests/relationship-application.test.ts
      - run: npx vitest run tests/connected-runtime.test.ts
      - run: npm run verify:package
